<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="//fonts.googleapis.com/css?family=Raleway:400,300,600" rel="stylesheet" type="text/css">
    <title>HTML 5 Boilerplate</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/skeleton.css">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>    
    <div class="container">
      <h1>CropsNH Crop Calculator</h1>
      <div class="row">
        <div class="one-half column">
          <div class="inputFieldDiv">
            <label for="cropDropdown">
            <span class="label-body">Crop:</span>
            <select id="cropDropdown"></select>
          </label>
          

          <label for="biomeDropdown">
            <span class="label-body">Biome:</span>
            <select id="biomeDropdown"></select>
          </label>
          
          <label for="hydrated">
            <input type="checkbox" id="hydrated">
            <span class="label-body"> Crops constantly hydrated? </span>
          </label>
          
          <label for="fertilized">
            <input type="checkbox" id="fertilized">
            <span class="label-body"> Crops constantly fertilized? </span>
          </label>

          <label for="canSeeSky">
            <input type="checkbox" id="canSeeSky">
            <span class="label-body"> Crops able to see the sky? </span>
          </label>


          <label for="growthStat">
            <span class="label-body">Growth Stat:</span>
            <input type="number" min="0" max="31" value="0" id="growthStat">
          </label>
          <label for="gainStat">
            <span class="label-body">Gain Stat:</span>
            <input type="number" min="0" max="31" value="0" id="gainStat">
          </label>
          </div>
          <div class="calculationResultDiv">
            <span>Average drops per harvest:</span>
            <table>
              <thead>
                <tr>
                  <th>Drop:</th>
                  <th>Drop Quantity:</th>
                </tr>
              </thead>
              <tbody id="dropPerHarvestList">

              </tbody>
            </table>
            <span>Full crop growths per hour: <span id="fullCropGrowths"></span></span><br>
            <span>Average drops per hour:</span>
            <table>
              <thead>
                <tr>
                  <th>Drop:</th>
                  <th>Drop Quantity:</th>
                </tr>
              </thead>
              <tbody id="dropPerHourList">

              </tbody>
            </table>
          </div>
        </div>

        <div class="one-half column">
        <div id="goodBiomes" class="calculationResultDiv">
          <b>Crop preferred biomes:</b>
          <table>
            <thead>
              <tr>
                <th>Biome</th>
                <th>Nutrient Score - Higher is better.</th>
              </tr>
            </thead>
            <tbody id="goodBiomesList">

            </tbody>
          </table>
          
        </div>
      </div>
      </div>
      
      


      
      
    </div>
  </body>




    <script src="js/constants.js"></script>
    <script src="js/init.js"></script>
    <script src="js/calculator.js"></script>
</html>
